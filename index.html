    <script>
      AFRAME.registerComponent("pool-waves", {
        schema: {
          speed: { default: 1.0 },
          amplitude: { default: 0.08 },
          frequency: { default: 3.0 },
        },
        init: function () {
          this.el.addEventListener("object3dset", this.update.bind(this));
        },
        tick: function (t) {
          var mesh = this.el.getObject3D("mesh");
          if (!mesh || !mesh.geometry) return;
          var d = this.data;
          var pos = mesh.geometry.attributes.position;
          if (!this._orig) {
            this._orig = new Float32Array(pos.array);
            mesh.geometry.setAttribute("position", pos);
          }
          var time = t * 0.001 * d.speed;
          for (var i = 0; i < pos.count; i++) {
            var ox = this._orig[i * 3];
            var oy = this._orig[i * 3 + 1];
            pos.array[i * 3 + 2] =
              this._orig[i * 3 + 2] +
              Math.sin(ox * d.frequency + time * 2.0) * d.amplitude +
              Math.cos(oy * d.frequency * 0.8 + time * 1.5) * d.amplitude * 0.6;
          }
          pos.needsUpdate = true;
        },
      });
    </script>
