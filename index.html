    <script>
      // Day/Night Cycle
      AFRAME.registerComponent("day-night-cycle", {
        schema: { duration: { default: 120000 } },
        init: function () {
          this.sky = document.querySelector("#sky");
          this.sun = document.querySelector("#light-sun");
          this.ambient = document.querySelector("#light-ambient");
          this.lamps = document.querySelectorAll("[id^=lamp-]");
        },
        tick: function (t) {
          var d = this.data.duration;
          var phase = (t % d) / d; // 0-1 repeating
          var angle = phase * Math.PI * 2;
          var dayFactor = Math.max(0, Math.sin(angle));
          var nightFactor = 1 - dayFactor;

          // Sky color: lerp between night blue and day blue
          var r = Math.round(10 + dayFactor * 125);
          var g = Math.round(10 + dayFactor * 180);
          var b = Math.round(46 + dayFactor * 209);
          this.sky.setAttribute("color", "rgb(" + r + "," + g + "," + b + ")");

          // Directional light intensity
          this.sun.setAttribute("light", "intensity", 0.1 + dayFactor * 1.4);
          // Ambient light
          var ar = Math.round(42 + dayFactor * 160);
          var ag = Math.round(42 + dayFactor * 160);
          var ab = Math.round(85 + dayFactor * 130);
          this.ambient.setAttribute(
            "light",
            "color",
            "rgb(" + ar + "," + ag + "," + ab + ")",
          );
          this.ambient.setAttribute(
            "light",
            "intensity",
            0.4 + dayFactor * 0.6,
          );

          // Lamp posts: bright at night, dim during day
          var lampIntensity = 0.2 + nightFactor * 1.8;
          var lampOpacity = 0.3 + nightFactor * 0.62;
          for (var i = 0; i < this.lamps.length; i++) {
            var sphere = this.lamps[i].querySelector("a-sphere");
            var light = this.lamps[i].querySelector("[light]");
            if (light) light.setAttribute("light", "intensity", lampIntensity);
            if (sphere) sphere.setAttribute("material", "opacity", lampOpacity);
          }
        },
      });

      // Firefly Particles
      AFRAME.registerComponent("fireflies", {
        schema: {
          count: { default: 60 },
          range: { default: 40 },
          height: { default: 8 },
        },
        init: function () {
          this.flies = [];
          var geo = new THREE.SphereGeometry(0.04, 4, 4);
          for (var i = 0; i < this.data.count; i++) {
            var mat = new THREE.MeshBasicMaterial({
              color: 0xffee88,
              transparent: true,
              opacity: Math.random() * 0.5 + 0.5,
            });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(
              (Math.random() - 0.5) * this.data.range * 2,
              Math.random() * this.data.height + 2.5,
              (Math.random() - 0.5) * this.data.range * 2,
            );
            this.flies.push({
              mesh: mesh,
              speed: Math.random() * 0.3 + 0.1,
              offset: Math.random() * Math.PI * 2,
              drift: (Math.random() - 0.5) * 0.02,
            });
            this.el.object3D.add(mesh);
          }
        },
        tick: function (t) {
          var time = t * 0.001;
          for (var i = 0; i < this.flies.length; i++) {
            var f = this.flies[i];
            f.mesh.position.y += Math.sin(time * f.speed + f.offset) * 0.003;
            f.mesh.position.x += f.drift;
            f.mesh.material.opacity =
              0.3 + Math.sin(time * f.speed * 2 + f.offset) * 0.4;
            // Wrap around if too far
            if (Math.abs(f.mesh.position.x) > this.data.range) f.drift *= -1;
          }
        },
      });

      // Car Engine Sound on Click
      AFRAME.registerComponent("engine-sound", {
        init: function () {
          this.audioCtx = null;
          this.el.classList.add("clickable");
          this.el.addEventListener("click", this.playEngine.bind(this));
        },
        playEngine: function () {
          if (!this.audioCtx)
            this.audioCtx = new (
              window.AudioContext || window.webkitAudioContext
            )();
          var ctx = this.audioCtx;
          var now = ctx.currentTime;
          // Rumble oscillator
          var osc1 = ctx.createOscillator();
          osc1.type = "sawtooth";
          osc1.frequency.setValueAtTime(55, now);
          osc1.frequency.linearRampToValueAtTime(120, now + 0.3);
          osc1.frequency.linearRampToValueAtTime(180, now + 0.8);
          osc1.frequency.linearRampToValueAtTime(85, now + 2.0);
          // Second harmonic
          var osc2 = ctx.createOscillator();
          osc2.type = "square";
          osc2.frequency.setValueAtTime(110, now);
          osc2.frequency.linearRampToValueAtTime(240, now + 0.3);
          osc2.frequency.linearRampToValueAtTime(360, now + 0.8);
          osc2.frequency.linearRampToValueAtTime(170, now + 2.0);
          // Gain envelope
          var gain = ctx.createGain();
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.15, now + 0.1);
          gain.gain.linearRampToValueAtTime(0.25, now + 0.4);
          gain.gain.linearRampToValueAtTime(0.1, now + 1.5);
          gain.gain.linearRampToValueAtTime(0, now + 2.5);
          // Distortion
          var dist = ctx.createWaveShaper();
          var curve = new Float32Array(256);
          for (var i = 0; i < 256; i++) {
            var x = i / 128 - 1;
            curve[i] = ((Math.PI + 200) * x) / (Math.PI + 200 * Math.abs(x));
          }
          dist.curve = curve;
          osc1.connect(dist);
          osc2.connect(dist);
          dist.connect(gain);
          gain.connect(ctx.destination);
          osc1.start(now);
          osc2.start(now);
          osc1.stop(now + 2.5);
          osc2.stop(now + 2.5);
        },
      });

      AFRAME.registerComponent("pool-waves", {
        schema: {
          speed: { default: 1.0 },
          amplitude: { default: 0.08 },
          frequency: { default: 3.0 },
        },
        init: function () {
          this.el.addEventListener("object3dset", this.update.bind(this));
        },
        tick: function (t) {
          var mesh = this.el.getObject3D("mesh");
          if (!mesh || !mesh.geometry) return;
          var d = this.data;
          var pos = mesh.geometry.attributes.position;
          if (!this._orig) {
            this._orig = new Float32Array(pos.array);
            mesh.geometry.setAttribute("position", pos);
          }
          var time = t * 0.001 * d.speed;
          for (var i = 0; i < pos.count; i++) {
            var ox = this._orig[i * 3];
            var oy = this._orig[i * 3 + 1];
            pos.array[i * 3 + 2] =
              this._orig[i * 3 + 2] +
              Math.sin(ox * d.frequency + time * 2.0) * d.amplitude +
              Math.cos(oy * d.frequency * 0.8 + time * 1.5) * d.amplitude * 0.6;
          }
          pos.needsUpdate = true;
        },
      });
    </script>

      /* Mobile Joystick */
      #mobile-controls {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        pointer-events: none;
      }
      @media (max-width: 768px), (pointer: coarse) {
        #mobile-controls {
          display: flex;
          justify-content: space-between;
          padding: 20px 24px;
        }
      }
      .joystick-zone {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 2px solid rgba(255, 255, 255, 0.25);
        position: relative;
        pointer-events: auto;
        touch-action: none;
      }
      .joystick-knob {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

    <!-- Mobile Joystick Script -->
    <script>
      (function () {
        var rig = document.getElementById("rig");
        var cam = document.getElementById("cam");
        function setupJoystick(zoneId, knobId, callback) {
          var zone = document.getElementById(zoneId);
          var knob = document.getElementById(knobId);
          if (!zone) return;
          var active = false,
            startX = 0,
            startY = 0,
            maxR = 50;
          zone.addEventListener("touchstart", function (e) {
            e.preventDefault();
            active = true;
            var t = e.touches[0];
            startX = t.clientX;
            startY = t.clientY;
          });
          zone.addEventListener("touchmove", function (e) {
            if (!active) return;
            e.preventDefault();
            var t = e.touches[0];
            var dx = t.clientX - startX;
            var dy = t.clientY - startY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > maxR) {
              dx = (dx / dist) * maxR;
              dy = (dy / dist) * maxR;
            }
            knob.style.transform =
              "translate(calc(-50% + " + dx + "px), calc(-50% + " + dy + "px))";
            callback(dx / maxR, dy / maxR);
          });
          function end() {
            active = false;
            knob.style.transform = "translate(-50%, -50%)";
            callback(0, 0);
          }
          zone.addEventListener("touchend", end);
          zone.addEventListener("touchcancel", end);
        }
        var moveX = 0,
          moveY = 0,
          lookX = 0,
          lookY = 0;
        setupJoystick("move-joystick", "move-knob", function (x, y) {
          moveX = x;
          moveY = y;
        });
        setupJoystick("look-joystick", "look-knob", function (x, y) {
          lookX = x;
          lookY = y;
        });
        var speed = 0.12;
        var lookSpeed = 0.6;
        function tick() {
          if (Math.abs(moveX) > 0.05 || Math.abs(moveY) > 0.05) {
            var rot = rig.getAttribute("rotation");
            var rad = THREE.MathUtils.degToRad(rot.y);
            var pos = rig.getAttribute("position");
            pos.x += (-moveX * Math.cos(rad) - moveY * Math.sin(rad)) * speed;
            pos.z += (moveX * Math.sin(rad) - moveY * Math.cos(rad)) * speed;
            rig.setAttribute("position", pos);
          }
          if (Math.abs(lookX) > 0.05 || Math.abs(lookY) > 0.05) {
            var rot = rig.getAttribute("rotation");
            rot.y -= lookX * lookSpeed;
            rig.setAttribute("rotation", rot);
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
